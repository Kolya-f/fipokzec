<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolya-f | Створення сайтів на замовлення</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <div class="logo">Kolya<span class="logo-accent">.dev</span></div>
                <ul class="nav-links">
                    <li><a href="#services">Послуги</a></li>
                    <li><a href="#portfolio">Портфоліо</a></li>
                    <li><a href="#contacts">Контакти</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="container hero-grid">
            <div class="hero-text">
                <h1>Створюю сайти, <span class="highlight">які приносять клієнтів</span></h1>
                <p>Сучасний дизайн, адаптивна верстка та простота в управлінні. Зробимо ваш бізнес помітним в інтернеті.</p>
                <div>
                    <a href="#contacts" class="btn">Замовити сайт</a>
                    <a href="#portfolio" class="btn btn-outline">Портфоліо</a>
                </div>
            </div>
        </div>
    </section>

    <section id="services">
        <div class="container">
            <h2 class="section-title">Мої послуги</h2>
            <div class="services-grid" id="servicesGrid">
                <!-- Сервіси будуть додані через JavaScript -->
            </div>
        </div>
    </section>

    <section id="portfolio" class="bg-light">
        <div class="container">
            <h2 class="section-title">Приклади робіт</h2>
            <div class="portfolio-grid" id="portfolioGrid">
                <!-- Портфоліо буде додано через JavaScript -->
            </div>
        </div>
    </section>

    <section id="contacts">
        <div class="container contacts">
            <h2>📬 Зв'язатись зі мною</h2>
            <p id="contactText"></p>
            <a href="mailto:kolyaf.web@gmail.com" class="btn btn-purple" id="emailLink">kolyaf.web@gmail.com</a>
            <div class="social-links" id="socialLinks">
                <!-- Соцмережі будуть додані через JavaScript -->
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p id="footerText"></p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
